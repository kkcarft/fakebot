name: FakeBot 24/7

# 每 6 小时开一班作为兜底;主接力由每班结尾的"接力下一班"步骤自触发,保证零空窗
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}   # 也允许在 Actions 页面手动点 Run workflow 立即启动

# 同一时刻只允许一个班次在跑:
# cancel-in-progress: false = 新触发排队等待,绝不杀掉正在保活的假人。
# 之前用 true 会在下一班触发时直接取消正在运行的保活任务,
# 导致假人掉线 -> Aternos 判定无人在线 -> 自动关服(就是"晚上开、早上关"的元凶)。
concurrency:
  group: fakebot
  cancel-in-progress: false

permissions:
  contents: write        # 允许本工作流向仓库提交, 用于 60 天保活
  actions: write         # 允许本工作流自触发下一班接力

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360          # GitHub 上限 360;内层 timeout 21540(≈359分)到点后本班收工并接力下一班,零空窗
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # 仓库没有 package-lock.json,不能开 cache:'npm'(会报找不到 lock 文件而失败)

      - name: 安装依赖
        run: npm install --omit=dev --no-audit --no-fund

      - name: 保活提交 (每班空 commit, 重置 60 天无活动停用定时任务的计时器)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "keepalive: touch repo to avoid 60-day scheduled-workflow disable"
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}

      - name: 运行假人 (约 359 分后正常收工,结尾步骤接力下一班实现无缝 24/7)
        id: runbot
        env:
          AUTHME_PASSWORD: ${{ secrets.AUTHME_PASSWORD }}
          ATERNOS_EMAIL: ${{ secrets.ATERNOS_EMAIL }}
          ATERNOS_PASSWORD: ${{ secrets.ATERNOS_PASSWORD }}
        run: |
          timeout 21540 node src/index.js < /dev/null
          code=$?
          # 退出码 0(正常关机)或 124(timeout 到点)都视为"本班正常收工",放行接力;
          # 其它退出码(如代码崩溃/异常)才视为失败,让任务变红以便你立刻发现服挂了。
          # (原脚本末尾的 || true 会把一切失败都藏成绿色,故去掉。)
          if [ "$code" -eq 0 ] || [ "$code" -eq 124 ]; then
            echo "本班假人正常收工 (退出码 $code),准备接力下一班"
          else
            echo "::error::假人异常退出,退出码 $code —— 服务器可能已离线,请检查!"
            exit "$code"
          fi

      - name: 接力下一班 (无缝衔接,避免空窗导致 Aternos 自动关服)
        if: always()   # 即使上一班异常也尽量接力,保住 24/7;手动 Cancel 整个工作流时本步会被跳过
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 5
          gh workflow run fakebot.yml
