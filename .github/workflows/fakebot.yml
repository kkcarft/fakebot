name: FakeBot 24/7
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}
concurrency:
  group: fakebot
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 安装 Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 安装依赖
        run: npm install --omit=dev --no-audit --no-fund
      - name: 保活提交
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "keepalive: touch repo to avoid 60-day scheduled-workflow disable"
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
      - name: 运行假人
        run: timeout 21540 node src/index.js < /dev/null || true
