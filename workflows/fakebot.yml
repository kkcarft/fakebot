name: FakeBot 24/7

# 每 6 小时开一班接力任务(GitHub cron 可能延迟几分钟,属正常)
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}   # 也允许在 Actions 页面手动点 Run workflow 立即启动

# 新班次启动时自动取消上一班,避免两班假人同名冲突
concurrency:
  group: fakebot
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 355          # GitHub 上限 360,留 5 分钟余量
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖
        run: npm install --omit=dev --no-audit --no-fund

      - name: 运行假人 (5小时45分后正常收工,等待下一班接力)
        run: timeout 20700 node src/index.js < /dev/null || true
